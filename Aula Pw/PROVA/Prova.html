<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Análise de Produtos </title>
    <link rel="stylesheet" href="Prova.css">
</head>
<body>
    <div class="container">
        <div class="titulo">
            <h1 class="tiitulo">Painel de Análise de Produtos</h1>
        </div>

    </div>

    <div class="Adicionar">
        <div class="Separando">
            <input type="text" id="Tarefa" value="Nome Produto">
            <input type="text" id="Preço" value="Preço (R$)">
            <input type="text" id="Quantidade" value="Quantidade    ">        
            <input type="button" id="Adicionar" value="Adicionar Produto">
            </div>
        </div>


    <div class="Cards">
        <div class="Linha">
            <div class="BlocoMaior" id="B1">
                <div class="BlocoMenor" id="T1">
                    <h1 class="Titulo1">Produto Mais Caro</h1>
                </div>
                <h1 id="Maiscaro"> </h1>

            </div>
            <div class="BlocoMaior" id="B2">
                <div class="BlocoMenor" id="T2">
                    <h1 class="Titulo1">Maior Quantidade</h1>
                </div>
                <div class="MQT">
                    <h1 id="Maiorquantidade"></h1>
                </div>
            </div>

            <div class="BlocoMaior" id="B3">
                <div class="BlocoMenor" id="T3">
                    <h1 class="Titulo1">Valor Total em Estoque </h1>
                </div>
                <div class="VTE">
                    <h1 id="Totalestoque"></h1>

                </div>
            </div>
        </div>
    </div>
    <script src="Prova.js"></script>
</body>
</html>
